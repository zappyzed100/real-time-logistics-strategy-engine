version: 2

models:
  - name: stg_orders
    description: "クレンジング済みの注文データ。Snowflakeの生データをソースとする。"
    columns:
      - name: order_id
        description: "注文の主キー"
        tests:
          - unique
          - not_null
      - name: product_id
        description: "注文された商品のID。PRODUCTSテーブルとの整合性をチェック。"
        tests:
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id

  - name: stg_products
    description: "商品マスターデータ。"
    columns:
      - name: product_id
        description: "商品の主キー"
        tests:
          - unique
          - not_null

  - name: stg_logistics_centers
    description: "物流拠点のマスターデータ。"
    columns:
      - name: center_id
        description: "拠点の主キー"
        tests:
          - unique
          - not_null

  - name: stg_shipping_costs
    description: "物流拠点ごとの配送コスト係数。"
    columns:
      - name: center_id
        description: "拠点の主キー。LOGISTICS_CENTERSとの整合性をチェック。"
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('stg_logistics_centers')
                field: center_id
      - name: shipping_cost
        description: "配送コスト係数。"
        tests:
          - not_null
