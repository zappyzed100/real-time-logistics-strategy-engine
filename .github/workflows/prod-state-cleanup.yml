name: Prod State Cleanup

on:
  workflow_dispatch:
    inputs:
      confirm_cleanup:
        description: "Acknowledge removal of known stale prod Terraform state entries"
        required: true
        type: boolean
        default: false
      expected_workspace:
        description: "Safety check: target HCP Terraform workspace name"
        required: true
        type: string
        default: "prod-real-time-logistics-strategy-engine-distilled-mip-1m-01ms"

jobs:
  prod-state-cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: prod
    if: inputs.confirm_cleanup
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Remove known stale prod state entries
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.HCP_TERRAFORM_TOKEN }}
        run: |
          set -euo pipefail

          TARGET_WORKSPACE="prod-real-time-logistics-strategy-engine-distilled-mip-1m-01ms"
          if [ "${{ inputs.expected_workspace }}" != "$TARGET_WORKSPACE" ]; then
            echo "::error::expected_workspace does not match the guarded prod workspace."
            exit 1
          fi

          mkdir -p artifacts/terraform
          cat > terraform/ci.auto.tfvars <<'EOF'
          app_env = "prod"
          EOF

          terraform -chdir=terraform init -reconfigure -backend-config=backend.prod.hcl

          terraform -chdir=terraform state list | tee artifacts/terraform/prod-state-cleanup-before.txt
          terraform -chdir=terraform state pull > artifacts/terraform/prod-state-before.json

          removed_count=0
          cleanup_log="artifacts/terraform/prod-state-cleanup.log"
          exec > >(tee "$cleanup_log") 2>&1

          echo "Starting guarded cleanup for known stale prod state entries..."

          remove_if_present() {
            local addr="$1"
            if terraform -chdir=terraform state show -no-color "$addr" >/dev/null 2>&1; then
              echo "Removing stale state: $addr"
              terraform -chdir=terraform state rm "$addr"
              removed_count=$((removed_count + 1))
            else
              echo "Already absent: $addr"
            fi
          }

          verify_and_remove_user() {
            local addr="$1"
            local state_body
            state_body="$(terraform -chdir=terraform state show -no-color "$addr" 2>/dev/null || true)"

            if [ -z "$state_body" ]; then
              echo "Already absent: $addr"
              return
            fi

            if echo "$state_body" | grep -Eq 'network_policy\s*=\s*"PROD_TERRAFORM_NETWORK_POLICY"'; then
              echo "Verified stale network_policy attribute on: $addr"
              terraform -chdir=terraform state rm "$addr"
              removed_count=$((removed_count + 1))
              return
            fi

            echo "::error::State entry exists but stale network_policy marker was not found: $addr"
            exit 1
          }

          verify_and_remove_legacy_grant() {
            local addr="$1"
            local state_body
            state_body="$(terraform -chdir=terraform state show -no-color "$addr" 2>/dev/null || true)"

            if [ -z "$state_body" ]; then
              echo "Already absent: $addr"
              return
            fi

            if echo "$state_body" | grep -Eq 'account_role_name\s*=\s*"PROD_(DBT|LOADER|STREAMLIT)_ROLE"'; then
              echo "Verified legacy functional-role grant on: $addr"
              terraform -chdir=terraform state rm "$addr"
              removed_count=$((removed_count + 1))
              return
            fi

            echo "::error::State entry exists but legacy functional-role marker was not found: $addr"
            exit 1
          }

          remove_if_present 'module.snowflake_env.snowflake_network_policy.terraform_access_policy'

          verify_and_remove_user 'module.snowflake_env.snowflake_user.loader_user'
          verify_and_remove_user 'module.snowflake_env.snowflake_user.dbt_user'
          verify_and_remove_user 'module.snowflake_env.snowflake_user.streamlit_user'

          verify_and_remove_legacy_grant 'module.snowflake_env.snowflake_grant_privileges_to_account_role.dbt_wh_usage'
          verify_and_remove_legacy_grant 'module.snowflake_env.snowflake_grant_privileges_to_account_role.loader_wh_usage'
          verify_and_remove_legacy_grant 'module.snowflake_env.snowflake_grant_privileges_to_account_role.streamlit_wh_usage'

          terraform -chdir=terraform state list | tee artifacts/terraform/prod-state-cleanup-after.txt
          terraform -chdir=terraform state pull > artifacts/terraform/prod-state-after.json

          echo "Removed stale entries: $removed_count"

      - name: Save prod state cleanup artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: prod-state-cleanup-${{ github.run_id }}
          path: |
            artifacts/terraform/prod-state-cleanup.log
            artifacts/terraform/prod-state-cleanup-before.txt
            artifacts/terraform/prod-state-cleanup-after.txt
            artifacts/terraform/prod-state-before.json
            artifacts/terraform/prod-state-after.json
          if-no-files-found: warn