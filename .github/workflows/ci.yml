name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_prod_apply:
        description: "Run prod terraform apply"
        required: false
        type: boolean
        default: false

jobs:
  # prod dbt-debug を CI でも実行し、接続異常を apply 前に検知する。
  dbt-debug-prod-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - &checkout_step
        name: Checkout code
        uses: actions/checkout@v6

      - &install_uv_step
        name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "latest"

      - &setup_python_step
        name: Set up Python 3.11
        run: uv python install 3.11

      - &install_dependencies_step
        name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run dbt debug (prod, ci)
        env:
          APP_ENV: prod
          TF_VAR_SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_DBT_PRIVATE_KEY: ${{ secrets.PROD_DBT_USER_RSA_PRIVATE_KEY }}
          SNOWFLAKE_DBT_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          uv run python src/scripts/deploy/run_dbt.py debug

  # prod dbt-debug は terraform-prod-apply 完了後（main マージ後）にも実行し、
  # apply 後の Snowflake 実体に対して最終確認する。
  dbt-debug-prod:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [terraform-prod-apply]
    steps:
      - *checkout_step
      - *install_uv_step
      - *setup_python_step
      - *install_dependencies_step

      - name: Run dbt debug (prod)
        env:
          APP_ENV: prod
          TF_VAR_SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_DBT_PRIVATE_KEY: ${{ secrets.PROD_DBT_USER_RSA_PRIVATE_KEY }}
          SNOWFLAKE_DBT_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          uv run python src/scripts/deploy/run_dbt.py debug

  prod-approval-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: prod
    if: |
      github.event_name == 'pull_request' ||
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_prod_apply)
    steps:
      - name: Wait for production approval
        run: |
          echo "Production approval received. Continue apply -> loader -> dbt run -> dbt test."

  terraform-prod-apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [prod-approval-gate]
    if: |
      github.event_name == 'pull_request' ||
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_prod_apply)
    steps:
      - *checkout_step
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Run prod terraform apply
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.HCP_TERRAFORM_TOKEN }}
          TF_VAR_app_env: prod
        run: |
          mkdir -p artifacts/terraform
          terraform -chdir=terraform init -reconfigure -backend-config=backend.prod.hcl
          terraform -chdir=terraform apply -auto-approve | tee artifacts/terraform/prod-apply.log

      - name: Save terraform apply artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: terraform-prod-apply-${{ github.run_id }}
          path: |
            artifacts/terraform/prod-apply.log
          if-no-files-found: warn

      - name: Comment on commit with apply result
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const applyLog = fs.readFileSync('artifacts/terraform/prod-apply.log', 'utf8');
            const summary = applyLog.includes('Apply complete!') ? '✅ Apply completed successfully' : '⚠️ Apply encountered warnings or errors';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `${summary}\n\n[View artifacts](${context.payload.pull_request?.html_url || context.ref})`
            });

  prod-loader-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [terraform-prod-apply]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - *checkout_step
      - *install_uv_step
      - *setup_python_step
      - *install_dependencies_step

      - name: Run prod snowflake loader
        env:
          APP_ENV: prod
          TF_VAR_SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          PROD_LOADER_USER_RSA_PRIVATE_KEY: ${{ secrets.PROD_LOADER_USER_RSA_PRIVATE_KEY }}
        run: |
          mkdir -p artifacts/data-pipeline
          uv run python src/infrastructure/snowflake_loader.py | tee artifacts/data-pipeline/prod-loader.log

      - name: Save loader artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: prod-loader-${{ github.run_id }}
          path: artifacts/data-pipeline/prod-loader.log
          if-no-files-found: warn

  prod-dbt-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [prod-loader-run]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - *checkout_step
      - *install_uv_step
      - *setup_python_step
      - *install_dependencies_step

      - name: Run prod dbt run
        env:
          APP_ENV: prod
          TF_VAR_SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_DBT_PRIVATE_KEY: ${{ secrets.PROD_DBT_USER_RSA_PRIVATE_KEY }}
          SNOWFLAKE_DBT_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          mkdir -p artifacts/data-pipeline
          uv run python src/scripts/deploy/run_dbt.py run | tee artifacts/data-pipeline/prod-dbt-run.log

      - name: Save dbt run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: prod-dbt-run-${{ github.run_id }}
          path: |
            artifacts/data-pipeline/prod-dbt-run.log
            src/transform/target/run_results.json
          if-no-files-found: warn

  prod-dbt-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [prod-dbt-run]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - *checkout_step
      - *install_uv_step
      - *setup_python_step
      - *install_dependencies_step

      - name: Run prod dbt test
        env:
          APP_ENV: prod
          TF_VAR_SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_DBT_PRIVATE_KEY: ${{ secrets.PROD_DBT_USER_RSA_PRIVATE_KEY }}
          SNOWFLAKE_DBT_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          mkdir -p artifacts/data-pipeline
          uv run python src/scripts/deploy/run_dbt.py test | tee artifacts/data-pipeline/prod-dbt-test.log

      - name: Save dbt test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: prod-dbt-test-${{ github.run_id }}
          path: |
            artifacts/data-pipeline/prod-dbt-test.log
            src/transform/target/run_results.json
          if-no-files-found: warn
