name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_prod_plan:
        description: "Run prod terraform plan"
        required: false
        type: boolean
        default: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        # キャッシュを有効にして実行速度を向上
        enable-cache: true
        version: "latest"

    - name: Set up Python 3.11
      run: uv python install 3.11

    - name: Install dependencies
      # uv sync で pyproject.toml / uv.lock から環境を完全再現
      run: uv sync --frozen --all-groups

    - name: Run code quality checks
      # Ruff と CR 混入チェックをまとめて実行する。
      # .env は Git 管理外だが、ローカルに存在する場合はスクリプト側で確認する。
      run: |
        uv run python src/scripts/quality/check_code_quality.py

    - name: Test with pytest
      # src/connection_test.py が pytest の収集対象になりエラーを吐くのを防ぐため、
      # 明示的に tests/ ディレクトリを指定するか、収集対象から除外します。
      run: |
        uv run pytest tests/

  dbt-debug:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app_env: [dev, prod]
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        version: "latest"

    - name: Set up Python 3.11
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --frozen --all-groups

    - name: Show app env
      env:
        APP_ENV: ${{ matrix.app_env }}
      run: |
        echo "APP_ENV=${APP_ENV}"

    - name: Run dbt debug
      env:
        APP_ENV: ${{ matrix.app_env }}
        SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
        DEV_DBT_USER_RSA_PRIVATE_KEY: ${{ secrets.DEV_DBT_USER_RSA_PRIVATE_KEY }}
        PROD_DBT_USER_RSA_PRIVATE_KEY: ${{ secrets.PROD_DBT_USER_RSA_PRIVATE_KEY }}
        SNOWFLAKE_DBT_PRIVATE_KEY_DEV: ${{ secrets.DEV_DBT_USER_RSA_PRIVATE_KEY }}
        SNOWFLAKE_DBT_PRIVATE_KEY_PROD: ${{ secrets.PROD_DBT_USER_RSA_PRIVATE_KEY }}
        SNOWFLAKE_DBT_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
      run: |
        uv run python src/scripts/deploy/run_dbt.py debug

  dbt-rebuild-verify-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        version: "latest"

    - name: Set up Python 3.11
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --frozen --all-groups

    - name: Verify dbt rebuild on dev
      env:
        APP_ENV: dev
        SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
        DEV_DBT_USER_RSA_PRIVATE_KEY: ${{ secrets.DEV_DBT_USER_RSA_PRIVATE_KEY }}
        SNOWFLAKE_DBT_PRIVATE_KEY_DEV: ${{ secrets.DEV_DBT_USER_RSA_PRIVATE_KEY }}
        SNOWFLAKE_DBT_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
      run: |
        uv run python src/scripts/deploy/verify_dbt_view_rebuild.py

  terraform-prod-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_prod_plan)
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Prepare env for terraform wrapper
      env:
        HCP_TF_ORGANIZATION: ${{ secrets.HCP_TF_ORGANIZATION }}
      run: |
        if [ -z "${HCP_TF_ORGANIZATION}" ]; then
          echo "[terraform-prod-plan] HCP_TF_ORGANIZATION secret is required" >&2
          exit 1
        fi
        printf 'HCP_TF_ORGANIZATION=%s\n' "${HCP_TF_ORGANIZATION}" > .env

    - name: Run prod terraform plan via wrapper
      env:
        APP_ENV: prod
        CI: true
        GITHUB_ACTIONS: true
        TF_TOKEN_app_terraform_io: ${{ secrets.HCP_TERRAFORM_TOKEN }}
      run: |
        mkdir -p artifacts/terraform
        ./terraform/tf plan -no-color | tee artifacts/terraform/prod-plan.log

    - name: Save terraform plan artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: terraform-prod-plan-${{ github.run_id }}
        path: |
          artifacts/terraform/prod-plan.log
          terraform/98_runtime.auto.tfvars
          terraform/99_app_env.auto.tfvars
        if-no-files-found: warn