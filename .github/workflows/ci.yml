name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_prod_plan:
        description: "Run prod terraform plan"
        required: false
        type: boolean
        default: true
      run_provider_upgrade_check:
        description: "Run provider upgrade rehearsal check"
        required: false
        type: boolean
        default: false

jobs:
  lint:
    name: lint-${{ matrix.check }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - check: python
            install_uv: true
            setup_python: true
            install_dependencies: true
          - check: yaml
            install_uv: true
            setup_python: false
            install_dependencies: false
          - check: shell
            install_uv: false
            setup_python: false
            install_dependencies: false
          - check: markdown
            install_uv: false
            setup_python: false
            install_dependencies: false
          - check: docker
            install_uv: false
            setup_python: false
            install_dependencies: false
          - check: toml
            install_uv: false
            setup_python: false
            install_dependencies: false
          - check: terraform
            install_uv: false
            setup_python: false
            install_dependencies: false
    steps:
      - &checkout_step
        name: Checkout code
        uses: actions/checkout@v6

      - &install_uv_step
        name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # キャッシュを有効にして実行速度を向上
          enable-cache: true
          version: "latest"

      - &setup_python_step
        name: Set up Python 3.11
        run: uv python install 3.11

      - &install_dependencies_step
        name: Install dependencies
        # uv sync で pyproject.toml / uv.lock から環境を完全再現
        run: uv sync --frozen --all-groups

      - name: Install uv
        if: matrix.install_uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python 3.11
        if: matrix.setup_python
        run: uv python install 3.11

      - name: Install dependencies
        if: matrix.install_dependencies
        run: uv sync --frozen --all-groups

      - name: Setup Terraform
        if: matrix.check == 'terraform'
        uses: hashicorp/setup-terraform@v4

      - name: Install shellcheck
        if: matrix.check == 'shell'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Install markdownlint-cli2
        if: matrix.check == 'markdown'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nodejs npm
          npm install -g markdownlint-cli2

      - name: Install hadolint
        if: matrix.check == 'docker'
        run: |
          HADOLINT_VERSION=v2.12.0
          curl -sSL -o hadolint "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/hadolint

      - name: Install taplo
        if: matrix.check == 'toml'
        run: |
          TAPLO_VERSION=0.9.3
          curl -sSL "https://github.com/tamasfe/taplo/releases/download/${TAPLO_VERSION}/taplo-linux-x86_64.gz" \
            | gzip -d > taplo
          chmod +x taplo
          sudo mv taplo /usr/local/bin/taplo

      - name: Install tflint
        if: matrix.check == 'terraform'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends unzip
          TFLINT_VERSION=v0.54.0
          curl -sSL -o tflint.zip "https://github.com/terraform-linters/tflint/releases/download/${TFLINT_VERSION}/tflint_linux_amd64.zip"
          unzip -q tflint.zip
          chmod +x tflint
          sudo mv tflint /usr/local/bin/tflint
          rm -f tflint.zip

      - name: Run lint check
        # check_code_quality.py はローカルでは直列実行、CIでは matrix で並列実行する。
        run: |
          python3 src/scripts/quality/check_code_quality.py --only ${{ matrix.check }}

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - *checkout_step
      - *install_uv_step
      - *setup_python_step
      - *install_dependencies_step

      - name: Test with pytest
        # src/connection_test.py が pytest の収集対象になりエラーを吐くのを防ぐため、
        # 明示的に tests/ ディレクトリを指定するか、収集対象から除外します。
        run: |
          uv run pytest tests/

  dbt-debug:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - *checkout_step
      - *install_uv_step
      - *setup_python_step
      - *install_dependencies_step

      - name: Run dbt debug (dev)
        env:
          APP_ENV: dev
          TF_VAR_SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          DEV_DBT_USER_RSA_PRIVATE_KEY: ${{ secrets.DEV_DBT_USER_RSA_PRIVATE_KEY }}
          SNOWFLAKE_DBT_PRIVATE_KEY_DEV: ${{ secrets.DEV_DBT_USER_RSA_PRIVATE_KEY }}
          SNOWFLAKE_DBT_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          uv run python src/scripts/deploy/run_dbt.py debug

  # prod dbt-debug は terraform-prod-apply 完了後（main マージ後）にのみ実行。
  # PR 段階では PROD Snowflake の rsa_public_key が最新 apply 前のため意図的に除外。
  dbt-debug-prod:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [terraform-prod-apply]
    steps:
      - *checkout_step
      - *install_uv_step
      - *setup_python_step
      - *install_dependencies_step

      - name: Run dbt debug (prod)
        env:
          APP_ENV: prod
          TF_VAR_SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          PROD_DBT_USER_RSA_PRIVATE_KEY: ${{ secrets.PROD_DBT_USER_RSA_PRIVATE_KEY }}
          SNOWFLAKE_DBT_PRIVATE_KEY_PROD: ${{ secrets.PROD_DBT_USER_RSA_PRIVATE_KEY }}
          SNOWFLAKE_DBT_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          uv run python src/scripts/deploy/run_dbt.py debug

  dbt-rebuild-verify-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - *checkout_step
      - *install_uv_step
      - *setup_python_step
      - *install_dependencies_step

      - name: Verify dbt rebuild on dev
        env:
          APP_ENV: dev
          TF_VAR_SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          DEV_DBT_USER_RSA_PRIVATE_KEY: ${{ secrets.DEV_DBT_USER_RSA_PRIVATE_KEY }}
          SNOWFLAKE_DBT_PRIVATE_KEY_DEV: ${{ secrets.DEV_DBT_USER_RSA_PRIVATE_KEY }}
          SNOWFLAKE_DBT_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          uv run python src/scripts/deploy/verify_dbt_view_rebuild.py

  terraform-prod-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_prod_plan)
    steps:
      - *checkout_step
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Run prod terraform plan
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.HCP_TERRAFORM_TOKEN }}
          TF_VAR_app_env: prod
        run: |
          mkdir -p artifacts/terraform
          terraform -chdir=terraform init -reconfigure -backend-config=backend.prod.hcl
          terraform -chdir=terraform plan -var="app_env=prod" -no-color | tee artifacts/terraform/prod-plan.log

      - name: Save terraform plan artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: terraform-prod-plan-${{ github.run_id }}
          path: |
            artifacts/terraform/prod-plan.log
          if-no-files-found: warn

  terraform-provider-upgrade-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'workflow_dispatch' && inputs.run_provider_upgrade_check
    steps:
      - *checkout_step
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Run provider upgrade rehearsal
        run: |
          mkdir -p artifacts/terraform
          terraform -chdir=terraform init -backend=false -upgrade -no-color | tee artifacts/terraform/provider-upgrade-init.log
          terraform -chdir=terraform validate -no-color | tee artifacts/terraform/provider-upgrade-validate.log

      - name: Save provider upgrade artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: terraform-provider-upgrade-${{ github.run_id }}
          path: |
            artifacts/terraform/provider-upgrade-init.log
            artifacts/terraform/provider-upgrade-validate.log
          if-no-files-found: warn

  prod-approval-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: prod
    needs: [lint, test, terraform-prod-plan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for production approval
        run: |
          echo "Production approval received. Continue apply -> loader -> dbt run -> dbt test."

  terraform-prod-apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [prod-approval-gate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - *checkout_step
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Download prod terraform plan artifact
        uses: actions/download-artifact@v5
        if: false  # remote backend では plan ファイルの受け渡しは不要
        with:
          name: terraform-prod-plan-${{ github.run_id }}
          path: artifacts/terraform

      - name: Run prod terraform apply
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.HCP_TERRAFORM_TOKEN }}
          TF_VAR_app_env: prod
        run: |
          mkdir -p artifacts/terraform
          terraform -chdir=terraform init -reconfigure -backend-config=backend.prod.hcl
          terraform -chdir=terraform apply -var="app_env=prod" -auto-approve | tee artifacts/terraform/prod-apply.log

      - name: Save terraform apply artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: terraform-prod-apply-${{ github.run_id }}
          path: |
            artifacts/terraform/prod-apply.log
          if-no-files-found: warn

      - name: Comment on commit with apply result
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const applyLog = fs.readFileSync('artifacts/terraform/prod-apply.log', 'utf8');
            const summary = applyLog.includes('Apply complete!') ? '✅ Apply completed successfully' : '⚠️ Apply encountered warnings or errors';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `${summary}\n\n[View artifacts](${context.payload.pull_request?.html_url || context.ref})`
            });

  prod-loader-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [terraform-prod-apply]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - *checkout_step
      - *install_uv_step
      - *setup_python_step
      - *install_dependencies_step

      - name: Run prod snowflake loader
        env:
          APP_ENV: prod
          TF_VAR_SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          PROD_LOADER_USER_RSA_PRIVATE_KEY: ${{ secrets.PROD_LOADER_USER_RSA_PRIVATE_KEY }}
        run: |
          mkdir -p artifacts/data-pipeline
          uv run python src/infrastructure/snowflake_loader.py | tee artifacts/data-pipeline/prod-loader.log

      - name: Save loader artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: prod-loader-${{ github.run_id }}
          path: artifacts/data-pipeline/prod-loader.log
          if-no-files-found: warn

  prod-dbt-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [prod-loader-run]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - *checkout_step
      - *install_uv_step
      - *setup_python_step
      - *install_dependencies_step

      - name: Run prod dbt run
        env:
          APP_ENV: prod
          TF_VAR_SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          PROD_DBT_USER_RSA_PRIVATE_KEY: ${{ secrets.PROD_DBT_USER_RSA_PRIVATE_KEY }}
          SNOWFLAKE_DBT_PRIVATE_KEY_PROD: ${{ secrets.PROD_DBT_USER_RSA_PRIVATE_KEY }}
          SNOWFLAKE_DBT_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          mkdir -p artifacts/data-pipeline
          uv run python src/scripts/deploy/run_dbt.py run | tee artifacts/data-pipeline/prod-dbt-run.log

      - name: Save dbt run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: prod-dbt-run-${{ github.run_id }}
          path: |
            artifacts/data-pipeline/prod-dbt-run.log
            src/transform/target/run_results.json
          if-no-files-found: warn

  prod-dbt-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [prod-dbt-run]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - *checkout_step
      - *install_uv_step
      - *setup_python_step
      - *install_dependencies_step

      - name: Run prod dbt test
        env:
          APP_ENV: prod
          TF_VAR_SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          PROD_DBT_USER_RSA_PRIVATE_KEY: ${{ secrets.PROD_DBT_USER_RSA_PRIVATE_KEY }}
          SNOWFLAKE_DBT_PRIVATE_KEY_PROD: ${{ secrets.PROD_DBT_USER_RSA_PRIVATE_KEY }}
          SNOWFLAKE_DBT_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          mkdir -p artifacts/data-pipeline
          uv run python src/scripts/deploy/run_dbt.py test | tee artifacts/data-pipeline/prod-dbt-test.log

      - name: Save dbt test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: prod-dbt-test-${{ github.run_id }}
          path: |
            artifacts/data-pipeline/prod-dbt-test.log
            src/transform/target/run_results.json
          if-no-files-found: warn
