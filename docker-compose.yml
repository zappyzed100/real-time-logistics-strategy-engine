services:
  # Streamlit: フロントエンド/ダッシュボード
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    image: enterprise-data-platform:latest
    container_name: edp-streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    command: streamlit run src/streamlit/app.py --server.address 0.0.0.0 --server.port 8501

  # FastAPI: ロジック/APIレイヤー
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: enterprise-data-platform:latest
    container_name: edp-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    profiles:
      - optional
    command: python -m uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  # Dagster: オーケストレーション
  dagster:
    build:
      context: .
      dockerfile: Dockerfile
    image: enterprise-data-platform:latest
    container_name: edp-dagster
    ports:
      - "3000:3000"
    env_file:
      - .env
    profiles:
      - optional
    # Dagsterのディレクトリ構成に合わせてコマンドを調整してください
    command: dagster dev -h 0.0.0.0 -p 3000

# 共通のネットワーク設定（必要に応じて）
networks:
  default:
    name: edp-network
